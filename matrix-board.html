<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    /* ÉP CỨNG LAYOUT */
    body, html { height: 100%; margin: 0; padding: 0; font-family: sans-serif; background: #f4f5f7; overflow: hidden; }
    .main-layout { display: grid; grid-template-columns: 7.5fr 2.5fr; gap: 15px; padding: 15px; height: 100vh; box-sizing: border-box; }
    .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; height: 100%; }
    .quadrant, .pending-column { background: #fff; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; border: 1px solid #dfe1e6; overflow: hidden; }
    .pending-column { background: #f0f2f5; border: 2px dashed #c1c7d0; }
    .q-title { font-weight: bold; font-size: 11px; margin-bottom: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .q-title::before { content: ''; width: 8px; height: 8px; border-radius: 50%; }
    .q1-title::before { background: #eb5a46; } .q2-title::before { background: #0079bf; }
    .q3-title::before { background: #ff9f1a; } .q4-title::before { background: #8993a4; }
    .card-list { overflow-y: auto; flex-grow: 1; }
    .card-item { padding: 8px; margin-bottom: 6px; border-radius: 4px; border: 1px solid #dfe1e6; background: #fff; display: flex; align-items: center; justify-content: space-between; cursor: grab; }
    .card-item.is-done { opacity: 0.4; filter: grayscale(1); }
    .checkbox-custom { width: 15px; height: 15px; cursor: pointer; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #c1c7d0; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="main-layout">
    <div class="matrix-grid">
      <div class="quadrant"><div class="q-title q1-title">Q1: Làm ngay</div><div class="card-list" id="q1"></div></div>
      <div class="quadrant"><div class="q-title q2-title">Q2: Lên lịch</div><div class="card-list" id="q2"></div></div>
      <div class="quadrant"><div class="q-title q3-title">Q3: Ủy quyền</div><div class="card-list" id="q3"></div></div>
      <div class="quadrant"><div class="q-title q4-title">Q4: Xóa bỏ</div><div class="card-list" id="q4"></div></div>
    </div>
    <div class="pending-column"><div class="q-title">📥 Chờ phân loại</div><div class="card-list" id="pending"></div></div>
  </div>

  <script>
    const t = TrelloPowerUp.iframe();
    const API_KEY = 'DÁN_KEY_CỦA_THÀNH_VÀO_ĐÂY';

    async function syncTrello(cardId, checked) {
      const token = localStorage.getItem('t_token') || prompt("Nhập Token:");
      if(token) localStorage.setItem('t_token', token);
      await fetch(`https://api.trello.com/1/cards/${cardId}?dueComplete=${checked}&key=${API_KEY}&token=${token}`, { method: 'PUT' });
    }

    function refreshGradients(listId) {
      const items = document.getElementById(listId).querySelectorAll('.card-item:not(.is-done)');
      items.forEach((item, i) => {
        let h = listId==='q1'?9 : listId==='q2'?202 : listId==='q3'?35 : 210;
        item.style.backgroundColor = `hsl(${h}, 70%, ${95 + (i*1)}%)`;
      });
    }

    const save = () => {
      const ids = (qid) => [...document.getElementById(qid).children].map(e => e.dataset.id);
      t.set('board', 'shared', 'matrixOrder', { pending: ids('pending'), q1: ids('q1'), q2: ids('q2'), q3: ids('q3'), q4: ids('q4') });
    };

    t.render(() => {
      Promise.all([
        t.cards('id', 'name'),
        t.get('board', 'shared', 'matrixOrder', {pending:[], q1:[], q2:[], q3:[], q4:[]}),
        t.get('board', 'shared', 'matrixMap', {})
      ]).then(async ([cards, order, map]) => {
        const cat = {pending:[], q1:[], q2:[], q3:[], q4:[]};
        for(let c of cards) {
          c.done = await t.get(c.id, 'shared', 'completed', false);
          let q = 'pending';
          if (order.q1.includes(c.id)) q = 'q1'; else if (order.q2.includes(c.id)) q = 'q2'; else if (order.q3.includes(c.id)) q = 'q3'; else if (order.q4.includes(c.id)) q = 'q4';
          else if (map[c.id]) { const d = map[c.id]; if(d.imp>=4 && d.urg>=4) q='q1'; else if(d.imp>=4) q='q2'; else if(d.urg>=4) q='q3'; else q='q4'; }
          cat[q].push(c);
        }

        Object.keys(cat).forEach(k => {
          const res = document.getElementById(k); 
          const title = res.querySelector('.q-title'); res.innerHTML = ''; res.appendChild(title);
          cat[k].forEach(c => {
            const div = document.createElement('div'); div.className = `card-item ${c.done?'is-done':''}`; div.dataset.id = c.id;
            div.innerHTML = `<span><input type="checkbox" class="checkbox-custom" ${c.done?'checked':''}> ${c.name}</span>`;
            div.querySelector('input').onchange = (e) => {
              const val = e.target.checked;
              t.set(c.id, 'shared', 'completed', val);
              syncTrello(c.id, val);
              div.classList.toggle('is-done', val);
              refreshGradients(k);
            };
            res.appendChild(div);
          });
          refreshGradients(k);
        });

        ['pending', 'q1', 'q2', 'q3', 'q4'].forEach(id => {
          new Sortable(document.getElementById(id), { group: 'm', animation: 150, onEnd: save });
        });
      });
    });
  </script>
</body>
</html>
