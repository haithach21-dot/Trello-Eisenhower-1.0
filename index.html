<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 12px; color: #172b4d; }
    .control-row { display: flex; align-items: center; margin-bottom: 10px; }
    .label { width: 90px; font-size: 12px; font-weight: 700; color: #5e6c84; text-transform: uppercase; }
    .btn-group { display: flex; gap: 4px; }
    .btn-score { width: 32px; height: 32px; border: 1px solid #dfe1e6; border-radius: 4px; background: #fff; cursor: pointer; }
    .active-imp { background: #fff4f0; border-color: #ff7846; color: #ff7846; }
    .active-urg { background: #edf7ff; border-color: #0079bf; color: #0079bf; }
    .done-row { margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="control-row">
    <div class="label">Quan trọng</div>
    <div class="btn-group" id="imp-group">
      <button class="btn-score" data-val="1">1</button><button class="btn-score" data-val="2">2</button><button class="btn-score" data-val="3">3</button><button class="btn-score" data-val="4">4</button><button class="btn-score" data-val="5">5</button>
    </div>
  </div>
  <div class="control-row">
    <div class="label">Khẩn cấp</div>
    <div class="btn-group" id="urg-group">
      <button class="btn-score" data-val="1">1</button><button class="btn-score" data-val="2">2</button><button class="btn-score" data-val="3">3</button><button class="btn-score" data-val="4">4</button><button class="btn-score" data-val="5">5</button>
    </div>
  </div>
  <div class="done-row">
    <input type="checkbox" id="main-done" style="width:18px; height:18px; cursor:pointer;">
    <span>Đánh dấu hoàn thành (Tích xanh hệ thống)</span>
  </div>

  <script>
    const t = TrelloPowerUp.iframe();
    const API_KEY = 'DÁN_KEY_CỦA_THÀNH_VÀO_ĐÂY'; 

    async function syncTrello(checked) {
      const token = localStorage.getItem('t_token') || prompt("Nhập Token:");
      if(token) localStorage.setItem('t_token', token);
      const cardId = t.getContext().card;
      await fetch(`https://api.trello.com/1/cards/${cardId}?dueComplete=${checked}&key=${API_KEY}&token=${token}`, { method: 'PUT' });
    }

    document.getElementById('main-done').onchange = (e) => {
      const val = e.target.checked;
      t.set('card', 'shared', 'completed', val);
      syncTrello(val);
    };

    function saveScore(imp, urg) {
      const data = { imp: parseInt(imp), urg: parseInt(urg) };
      t.set('card', 'shared', 'eisenhower', data).then(() => {
        return t.get('board', 'shared', 'matrixMap', {});
      }).then(map => {
        map[t.getContext().card] = data;
        return t.set('board', 'shared', 'matrixMap', map);
      });
      // Cập nhật giao diện nút
      document.querySelectorAll('#imp-group .btn-score').forEach(b => b.className = `btn-score ${b.dataset.val == imp ? 'active-imp' : ''}`);
      document.querySelectorAll('#urg-group .btn-score').forEach(b => b.className = `btn-score ${b.dataset.val == urg ? 'active-urg' : ''}`);
    }

    // Gán sự kiện click cho các nút điểm
    document.querySelectorAll('.btn-score').forEach(btn => {
      btn.onclick = (e) => {
        const isImp = e.target.parentElement.id === 'imp-group';
        t.get('card', 'shared', 'eisenhower', {imp:1, urg:1}).then(curr => {
          if(isImp) saveScore(e.target.dataset.val, curr.urg);
          else saveScore(curr.imp, e.target.dataset.val);
        });
      };
    });

    t.render(() => {
      Promise.all([
        t.get('card', 'shared', 'eisenhower', {imp:1, urg:1}),
        t.get('card', 'shared', 'completed', false)
      ]).then(([data, done]) => {
        document.getElementById('main-done').checked = done;
        saveScore(data.imp, data.urg);
      });
    });
  </script>
</body>
</html>
