<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    TrelloPowerUp.initialize({
      'card-back-section': function(t, options) {
        return {
          title: 'Ma Trận Eisenhower',
          icon: 'https://cdn-icons-png.flaticon.com/512/25/25617.png',
          content: { type: 'iframe', url: t.signUrl('./index.html'), height: 230 }
        };
      },
      'card-badges': function(t, options) {
        return t.get('card', 'shared', 'eisenhower').then(function(data) {
          if (!data) return [];
          let label = ""; let color = "light-gray";
          if (data.imp >= 4 && data.urg >= 4) { label = "Q1: LÀM NGAY"; color = "red"; }
          else if (data.imp >= 4) { label = "Q2: LÊN LỊCH"; color = "blue"; }
          else if (data.urg >= 4) { label = "Q3: ỦY QUYỀN"; color = "orange"; }
          else { label = "Q4: XÓA BỎ"; color = "light-gray"; }
          return [{ text: label, color: color }];
        });
      },
      'board-buttons': function(t, options) {
        return [{
          icon: 'https://cdn-icons-png.flaticon.com/512/25/25617.png',
          text: 'Ma Trận Tổng Thể',
          callback: function(t) {
            return t.modal({ title: 'Ma Trận Eisenhower', url: t.signUrl('./matrix-board.html'), fullscreen: true });
          }
        }];
      }
    });
  </script>
</body>
</html>
